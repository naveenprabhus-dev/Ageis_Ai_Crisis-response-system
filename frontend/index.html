<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aegis AI Crisis Response System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    .container {
      margin-top: 80px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    p {
      color: #cbd5f5;
      margin-bottom: 40px;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }
    a {
      text-decoration: none;
      padding: 15px 30px;
      width: 250px;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      color: white;
      transition: 0.3s;
    }
    .gm { background: #2563eb; }
    .staff { background: #16a34a; }
    .guest { background: #f59e0b; }
    a:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
    footer {
      margin-top: 80px;
      font-size: 0.9rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚨 Aegis AI Crisis Response System</h1>
    <p>Select your interface to continue</p>
    <div class="buttons">
      <a href="/gm-app/" class="gm">🧑‍💼 GM Dashboard</a>
      <a href="/staff-app/" class="staff">👷 Staff App</a>
      <a href="/guest-app/" class="guest">🏨 Guest App</a>
    </div>
  </div>
  <footer>
    Powered by AI | Real-time Crisis Management System
  </footer>
</body>
</html>
