<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis | Safety Route</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #f8fafc;
        }
        .instruction-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .exit-arrow {
            animation: bounce-right 1s infinite;
        }
        @keyframes bounce-right {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(10px); }
        }
    </style>
</head>
<body class="p-6 max-w-md mx-auto">
    <!-- Header -->
    <div class="flex items-center gap-4 mb-8">
        <button onclick="history.back()" class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center shadow-sm text-gray-400">←</button>
        <div>
            <h1 class="text-xl font-semibold">Safety Guide</h1>
            <p class="text-xs text-gray-400">Floor 4 • Sector B</p>
        </div>
    </div>

    <!-- Live Map (Simulated) -->
    <div class="instruction-card p-4 mb-6 relative overflow-hidden h-80 bg-slate-100 flex items-center justify-center">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
        
        <!-- Floor Plan Representation -->
        <div class="w-64 h-64 border-4 border-white rounded-lg relative bg-white/50 backdrop-blur-sm">
            <div class="absolute top-10 left-10 w-4 h-4 bg-blue-500 rounded-full shadow-lg pulse"></div>
            <p class="absolute top-16 left-10 text-[8px] font-bold text-blue-500 uppercase">You</p>

            <!-- Exit Route Path -->
            <svg class="absolute inset-0 w-full h-full">
                <path d="M 40 40 L 40 180 L 220 180" fill="none" stroke="#22c55e" stroke-width="6" stroke-dasharray="10 5" />
            </svg>

            <div class="absolute bottom-10 right-10 flex flex-col items-center">
                <div class="w-8 h-12 bg-green-500 rounded flex items-center justify-center text-white text-[10px] font-bold">EXIT</div>
            </div>
        </div>
    </div>

    <!-- Action Instructions -->
    <div class="instruction-card p-8 mb-6">
        <div class="flex items-start gap-4 mb-6">
            <div class="w-12 h-12 rounded-2xl bg-orange-100 flex items-center justify-center text-orange-600 text-xl">📢</div>
            <div>
                <h3 class="font-bold text-gray-800">Live AI Announcement</h3>
                <p class="text-sm text-gray-500 italic">"Please head towards the North staircase. Avoid using elevators."</p>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex items-center gap-4 p-4 bg-green-50 rounded-2xl border border-green-100">
                <div class="w-6 h-6 bg-green-500 rounded-full flex items-center justify-center text-white text-xs">✓</div>
                <span class="text-sm font-medium text-green-700">North Stairs are Safe</span>
            </div>
            <div class="flex items-center gap-4 p-4 bg-red-50 rounded-2xl border border-red-100">
                <div class="w-6 h-6 bg-red-500 rounded-full flex items-center justify-center text-white text-xs">!</div>
                <span class="text-sm font-medium text-red-700">Main Lobby Blocked (Smoke)</span>
            </div>
        </div>
    </div>

    <!-- Help Button -->
    <button class="w-full bg-blue-600 text-white font-bold py-5 rounded-3xl shadow-lg shadow-blue-500/20 active:scale-95 transition-all">
        Message Safety Team
    </button>
</body>
</html>
