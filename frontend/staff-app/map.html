<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Staff | Tactical Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto Mono', monospace;
            background-color: #050505;
            color: #fff;
        }
        .map-container {
            background: #0a0a0a;
            border: 1px solid #222;
            position: relative;
            height: 400px;
            overflow: hidden;
            border-radius: 24px;
        }
        .grid-lines {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(to right, #111 1px, transparent 1px),
                linear-gradient(to bottom, #111 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .staff-marker {
            width: 12px;
            height: 12px;
            background: #ffde59;
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 15px #ffde59;
            z-index: 10;
        }
        .target-marker {
            width: 20px;
            height: 20px;
            border: 2px solid #ff4d4d;
            position: absolute;
            z-index: 5;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        .nav-btn {
            background: #111;
            border: 1px solid #222;
        }
        .nav-btn.active {
            background: #ffde59;
            color: #000;
            border-color: #ffde59;
        }
        .path-line {
            position: absolute;
            background: rgba(255, 222, 89, 0.2);
            height: 2px;
            transform-origin: left center;
        }
    </style>
</head>
<body class="p-6 flex flex-col h-screen max-w-md mx-auto">
    <!-- Header -->
    <div class="flex justify-between items-center mb-6 pt-4">
        <div>
            <h1 class="text-lg font-bold">TACTICAL_VIEW</h1>
            <p class="text-[10px] text-gray-500">FLOOR 4 • SECTOR DELTA</p>
        </div>
        <div class="text-right">
            <div class="text-[10px] text-gray-500">SIGNAL_STRENGTH</div>
            <div class="flex gap-1 justify-end mt-1">
                <div class="w-1 h-3 bg-green-500"></div>
                <div class="w-1 h-3 bg-green-500"></div>
                <div class="w-1 h-3 bg-green-500"></div>
                <div class="w-1 h-3 bg-gray-700"></div>
            </div>
        </div>
    </div>

    <!-- Live Map -->
    <div class="map-container mb-6">
        <div class="grid-lines"></div>
        
        <!-- Target -->
        <div id="target" class="target-marker" style="top: 20%; left: 70%;"></div>
        <div class="absolute top-[20%] left-[72%] text-[8px] font-bold text-red-500 bg-black/80 px-1">GUEST_SOS: RM 402</div>

        <!-- Staff Path -->
        <div class="path-line" style="top: 80%; left: 20%; width: 50%; transform: rotate(-45deg);"></div>
        
        <!-- Staff -->
        <div id="staff" class="staff-marker" style="top: 80%; left: 20%;"></div>
        <div class="absolute top-[82%] left-[22%] text-[8px] font-bold text-[#ffde59] bg-black/80 px-1">YOU</div>

        <!-- Heatmap Overlay (Smoke) -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-red-500/10 blur-3xl rounded-full"></div>
    </div>

    <!-- Navigation Info -->
    <div class="bg-[#111] border border-[#222] p-6 rounded-2xl mb-auto">
        <div class="flex items-center gap-4 mb-4">
            <div class="w-10 h-10 bg-yellow-500/10 rounded-full flex items-center justify-center text-yellow-500 font-bold">!</div>
            <div>
                <p class="text-[10px] text-gray-500 uppercase">Route Advisory</p>
                <p class="text-xs font-bold text-gray-200">Main hallway blocked by debris. Use Service Stairwell B.</p>
            </div>
        </div>
        <div class="flex justify-between items-end">
            <div>
                <p class="text-[10px] text-gray-500 uppercase">Est. Arrival</p>
                <p class="text-2xl font-bold text-white">1:45 <span class="text-xs font-normal text-gray-500">MINS</span></p>
            </div>
            <button class="bg-[#222] text-xs px-4 py-2 rounded-lg font-bold hover:bg-[#333]">RECALCULATE</button>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="grid grid-cols-3 gap-2 mt-8 pb-4">
        <button onclick="window.location.href='tasks.html'" class="nav-btn p-4 rounded-xl flex flex-col items-center gap-1">
            <div class="text-[10px] font-bold">TASK</div>
        </button>
        <button class="nav-btn active p-4 rounded-xl flex flex-col items-center gap-1">
            <div class="text-[10px] font-bold">MAP</div>
        </button>
        <button class="nav-btn p-4 rounded-xl flex flex-col items-center gap-1 opacity-50">
            <div class="text-[10px] font-bold">COMMS</div>
        </button>
    </div>

    <script>
        // Simple animation to make it look "live"
        const staff = document.getElementById('staff');
        let x = 20;
        let y = 80;
        
        setInterval(() => {
            x += (Math.random() - 0.5) * 0.5;
            y += (Math.random() - 0.5) * 0.5;
            staff.style.left = x + '%';
            staff.style.top = y + '%';
        }, 100);
    </script>
</body>
</html>
