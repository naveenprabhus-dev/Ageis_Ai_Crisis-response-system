<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Staff | Responder Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto Mono', monospace;
            background-color: #050505;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .responder-border {
            border: 2px solid #333;
            position: relative;
        }
        .responder-border::before {
            content: 'SECURE_ACCESS';
            position: absolute;
            top: -10px;
            left: 20px;
            background: #050505;
            padding: 0 10px;
            font-size: 10px;
            color: #666;
        }
        .input-box {
            background: #111;
            border: 1px solid #222;
        }
        .input-box:focus {
            border-color: #ffde59;
            background: #151515;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #222;
            border-radius: 50%;
        }
        .status-dot.active {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }
    </style>
</head>
<body class="p-6">
    <div class="w-full max-w-sm responder-border p-8 rounded-lg">
        <div class="flex items-center gap-3 mb-8">
            <div class="status-dot active"></div>
            <span class="text-xs text-green-500 uppercase tracking-widest">System Ready</span>
        </div>

        <h1 class="text-2xl font-bold mb-2">AEGIS_RESPONDER</h1>
        <p class="text-gray-500 text-xs mb-10">IND-WEST-SECTOR-04</p>

        <form id="staffLogin" class="space-y-8" onsubmit="handleLogin(event)">
            <div>
                <label class="block text-[10px] text-gray-500 uppercase mb-2">Badge Identification</label>
                <input id="badge-id" type="text" required class="w-full input-box px-4 py-4 text-lg font-bold outline-none rounded" placeholder="e.g. S-04">
            </div>
            
            <div class="pt-4">
                <button type="submit" class="w-full bg-[#ffde59] text-black font-bold py-5 rounded uppercase tracking-tighter hover:bg-[#ffed94] transition-colors active:scale-95">
                    Initialize Deployment
                </button>
            </div>
        </form>

        <div class="mt-12 text-[10px] text-gray-700 flex justify-between">
            <span>V2.4.1</span>
            <span>ENCRYPTED_LINK_ACTIVE</span>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const badgeId = document.getElementById('badge-id').value.trim();
            if (badgeId) {
                window.location.href = `tasks.html?id=${encodeURIComponent(badgeId)}`;
            }
        }
    </script>
</body>
</html>
